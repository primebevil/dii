<svg viewBox="0 0 820 560" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title>How a consumer connects to a pod after sponsorship</title>
  <desc>Sponsorship gives a consumer two things: the pod node's address (a base URL) and a token (an API key). Both are entered into any OpenAI-compatible client, which then reaches the consumer door on a pod node and uses the pod's models. These are the same two fields every OpenAI client already has.</desc>

  <defs>
    <marker id="a2" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#6b7280"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="820" height="560" fill="#ffffff"/>

  <text x="410" y="30" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1f2b">How a consumer connects — after sponsorship</text>
  <text x="410" y="52" text-anchor="middle" font-size="13" fill="#4a5160">Two things to configure, then any client works</text>

  <text x="410" y="80" text-anchor="middle" font-size="11" fill="#6b7280">what sponsorship gives you</text>
  <rect x="150" y="90" width="230" height="54" rx="8" fill="#eef2fb" stroke="#3b6ef5"/>
  <text x="265" y="113" text-anchor="middle" font-size="14" font-weight="700" fill="#2b5fe0">Pod address</text>
  <text x="265" y="131" text-anchor="middle" font-size="11" fill="#4a5160">the base URL</text>
  <rect x="440" y="90" width="230" height="54" rx="8" fill="#eef2fb" stroke="#3b6ef5"/>
  <text x="555" y="113" text-anchor="middle" font-size="14" font-weight="700" fill="#2b5fe0">Your token</text>
  <text x="555" y="131" text-anchor="middle" font-size="11" fill="#4a5160">the API key</text>

  <line x1="265" y1="144" x2="330" y2="176" stroke="#6b7280" marker-end="url(#a2)"/>
  <line x1="555" y1="144" x2="490" y2="176" stroke="#6b7280" marker-end="url(#a2)"/>

  <rect x="255" y="178" width="310" height="42" rx="8" fill="#f6f7f9" stroke="#b8beca"/>
  <text x="410" y="204" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1f2b">Put both into any client</text>

  <line x1="410" y1="220" x2="410" y2="238" stroke="#6b7280"/>
  <line x1="160" y1="238" x2="660" y2="238" stroke="#6b7280"/>
  <line x1="160" y1="238" x2="160" y2="258" stroke="#6b7280" marker-end="url(#a2)"/>
  <line x1="410" y1="238" x2="410" y2="258" stroke="#6b7280" marker-end="url(#a2)"/>
  <line x1="660" y1="238" x2="660" y2="258" stroke="#6b7280" marker-end="url(#a2)"/>

  <text x="410" y="252" text-anchor="middle" font-size="11" fill="#6b7280">any OpenAI-compatible client (pick any)</text>

  <rect x="60" y="260" width="200" height="50" rx="8" fill="#f6f7f9" stroke="#b8beca"/>
  <text x="160" y="281" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1f2b">Open WebUI</text>
  <text x="160" y="298" text-anchor="middle" font-size="11" fill="#6b7280">ready-made chat UI</text>

  <rect x="310" y="260" width="200" height="50" rx="8" fill="#f6f7f9" stroke="#b8beca"/>
  <text x="410" y="281" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1f2b">Custom app</text>
  <text x="410" y="298" text-anchor="middle" font-size="11" fill="#6b7280">web or mobile</text>

  <rect x="560" y="260" width="200" height="50" rx="8" fill="#f6f7f9" stroke="#b8beca"/>
  <text x="660" y="281" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1f2b">curl / agent / IDE</text>
  <text x="660" y="298" text-anchor="middle" font-size="11" fill="#6b7280">any OpenAI client</text>

  <line x1="160" y1="310" x2="160" y2="330" stroke="#6b7280"/>
  <line x1="410" y1="310" x2="410" y2="330" stroke="#6b7280"/>
  <line x1="660" y1="310" x2="660" y2="330" stroke="#6b7280"/>
  <line x1="160" y1="330" x2="660" y2="330" stroke="#6b7280"/>
  <line x1="410" y1="330" x2="410" y2="360" stroke="#6b7280" marker-end="url(#a2)"/>

  <rect x="230" y="362" width="360" height="50" rx="8" fill="#f6f7f9" stroke="#b8beca"/>
  <text x="410" y="383" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1f2b">Consumer door (remote ingress)</text>
  <text x="410" y="400" text-anchor="middle" font-size="11" fill="#6b7280">on a pod node — checks the token</text>
  <line x1="410" y1="412" x2="410" y2="434" stroke="#6b7280" marker-end="url(#a2)"/>

  <rect x="260" y="436" width="300" height="50" rx="8" fill="#eef2fb" stroke="#3b6ef5" stroke-width="2"/>
  <text x="410" y="457" text-anchor="middle" font-size="14" font-weight="700" fill="#2b5fe0">Pod resources</text>
  <text x="410" y="474" text-anchor="middle" font-size="11" fill="#4a5160">the models, served by the pod</text>

  <text x="410" y="520" text-anchor="middle" font-size="12" fill="#4a5160">It's the same two fields every OpenAI client already has: base URL + API key. Nothing custom required.</text>
</svg>
