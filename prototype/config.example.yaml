listen: ":8080"                              # this node's OpenAI endpoint listen addr
node_id: "A"                                 # label for this node
model_server: "http://localhost:11434/v1"    # Ollama's OpenAI base URL (default if omitted)
consumer_token: "dev-secret"                 # stub auth for the consumer door
advertise: "http://192.168.1.40:8080"        # this node's own URL, published in its manifest (optional)
peers:
  - "http://192.168.1.50:8080"               # peer node endpoints (node B, etc.)

# Optional tuning (defaults shown; omit to accept the default):
startup_timeout: "5s"                        # boot-time model-list and peer-manifest fetches
response_header_timeout: "30s"               # max wait for first byte from an upstream ("0s" = no limit)
max_body_bytes: 1048576                      # request body cap, in bytes
